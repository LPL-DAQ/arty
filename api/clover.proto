syntax = "proto2";

//////////////////////////////////////////////////////////////////////
// IMPORTANT:                                                       //
// When changing this file, you MUST re-run the following:          //
// protoc --python_out=scripts api/clover.proto --proto_path=api    //
//////////////////////////////////////////////////////////////////////

// Command stream.
// Delivered over a bytestream. Each incoming request is processed in sequence and will have its responses delivered in
// the same sequence.

// Every request sent to the server is an instance of this parent Request. The server then examines the payload to
// determine the exact command specified.
// next tag: 22
message Request {
  oneof payload {
    SubscribeDataStreamRequest subscribe_data_stream = 1;
    IdentifyClientRequest identify_client = 6;
    IsNotAbortedRequest is_not_aborted_request = 20;

    // Sensors
    ConfigureAnalogSensorsRequest configure_analog_sensors = 21;

    // Actuators
    ResetValvePositionRequest reset_valve_position = 2;
    PowerOffValveRequest power_off_valve = 18;
    PowerOnValveRequest power_on_valve = 19;

    // Transitions (VALVE_SEQ, THRUST_SEQ) -> ABORT
    AbortRequest abort = 10;
    // Transitions (CALIBRATE_VALVE, VALVE_SEQ, THRUST_SEQ, ABORT) -> IDLE
    HaltRequest halt = 11;
    // Transitions (VALVE_PRIMED, THRUST_PRIMED) -> IDLE
    UnprimeRequest unprime = 12;
    // Transitions IDLE -> CALIBRATE_VALVE
    CalibrateValveRequest calibrate_valve = 9;
    // Transitions IDLE -> VALVE_PRIMED
    LoadValveSequenceRequest load_valve_sequence = 13;
    // Transitions VALVE_PRIMED -> VALVE_SEQ
    StartValveSequenceRequest start_valve_sequence = 15;
    // Transitions IDLE -> THRUST_PRIMED
    LoadThrustSequenceRequest load_thrust_sequence = 14;
    // Transiitons THRUST_PRIMED -> THRUST_SEQ
    StartThrustSequenceRequest start_thrust_sequence = 16;
  }
}

// Successful if err is missing.
message Response {
  optional string err = 1;
}

// Subscribe client IP to data stream.
message SubscribeDataStreamRequest {}

// Errors if the state is ABORT. Otherwise, returns OK.
message IsNotAbortedRequest {}

// Names client.
message IdentifyClientRequest {
  required ClientType client = 1;
}

enum ClientType {
  UNKNOWN_CLIENT = 1;
  GNC = 2;
  DAQ = 3;
}

// Configure analog inputs as PTs or TCs. Should be called early in
// program lifetime to ensure analog sensor readings get populated.
message ConfigureAnalogSensorsRequest {
  repeated AnalogSensorConfig configs = 1;
}

// Either all pt_* fields must be set, or all tc_* fields must be set, or all raw_* fields must be set.
message AnalogSensorConfig {
  // Sensor input number, corresponds to an ADC and its channel. Set in devicetree.
  required uint32 channel = 1;
  required AnalogSensor assignment = 2;

  optional float pt_range_psig = 3;
  optional float pt_bias_psig = 4;

  optional TCType tc_type = 5;

  optional float raw_range_v = 6;
  optional float raw_bias_v = 7;
}

enum TCType {
  UNKNOWN_TC_TYPE = 0;
  K_TYPE = 1;
  T_TYPE = 2;
}

enum AnalogSensor {
  UNKNOWN_ANALOG_SENSOR = 0;

  // Vehicle pressurant
  PT001 = 1;
  PT002 = 2;
  PT003 = 3;
  PT004 = 4;
  PT005 = 5;

  // Vehicle fuel side
  PT101 = 6;

  // Vehicle LOx side
  PT201 = 7;

  // Engine
  PTF1 = 8;
  PTF2 = 9;
  PTO1 = 10;
  PTC1 = 11;
  PTC2 = 12;

  // TCs
  TC001 = 13;
  TC101 = 14;
  TC102 = 15;
  TCF1 = 16;
  TCO1 = 17;

  // GSE pressurant
  PTG001 = 18;
  PTG002 = 19;

  // GSE LOx
  PTG101 = 20;

  // Hornet
  BATTERY_VOLTAGE = 21;
}

// Reset the valve's position.
message ResetValvePositionRequest {
  required Valve valve = 1;
  required float new_pos_deg = 2;
}

enum Valve {
  UNKNOWN_VALVE = 0;
  FUEL = 1;
  LOX = 2;
}

// Turn on stepper motor.
message PowerOnValveRequest {
  required Valve valve = 1;
}

// Turn off stepper motor.
message PowerOffValveRequest {
  required Valve valve = 1;
}

// Abort an active control sequence into a safe state.
message AbortRequest {}

// Halt all actuators.
message HaltRequest {}

// Unprime a request.
message UnprimeRequest {}

// Enter valve calibration mode.
message CalibrateValveRequest {
  required Valve valve = 1;
}

// Load a valve motor sequence. At least one trace must be set.
message LoadValveSequenceRequest {
  optional ControlTrace fuel_trace_deg = 1;
  optional ControlTrace lox_trace_deg = 2;
}

// Start a loaded valve motor sequence.
message StartValveSequenceRequest {}

// Load a thrust sequence.
message LoadThrustSequenceRequest {
  required ControlTrace thrust_trace_lbf = 1;
}

// Start a loaded thrust sequence.
message StartThrustSequenceRequest {}

// Control sequences
message ControlTrace {
  required uint32 total_time_ms = 1;
  repeated Segment segments = 2;
}

message Segment {
  required uint32 start_ms = 1;
  required uint32 length_ms = 2;
  oneof type {
    LinearSegment linear = 3;
    SineSegment sine = 4;
  }
}

message LinearSegment {
  required float start_val = 1;
  required float end_val = 2;
}

message SineSegment {
  required float offset = 1;
  required float amplitude = 2;
  required float period = 3;
  required float phase_deg = 4;
}


// Data stream.
// Delivered in individual packets on a regular interval, only from clover to external listeners.

// Controller State definition
enum SystemState {
  STATE_UNKNOWN = 0;
  STATE_IDLE = 1;
  STATE_FLIGHT = 2;
  STATE_THROTTLE = 3;
  STATE_TVC = 4;
  STATE_RCS = 5;
  STATE_TVC_THROTTLE = 6;
  STATE_TVC_THROTTLE_RCS = 7;
  STATE_ABORT = 8;

}
enum ThrottleState {
  THROTTLE_STATE_UNKNOWN = 0;
  THROTTLE_STATE_IDLE = 1;
  THROTTLE_STATE_CALIBRATE_VALVE = 2;
  THROTTLE_STATE_VALVE_PRIMED = 3;
  THROTTLE_STATE_VALVE_SEQ = 4;
  THROTTLE_STATE_THRUST_PRIMED = 5;
  THROTTLE_STATE_THRUST_SEQ = 6;
  THROTTLE_STATE_ABORT = 7;
  THROTTLE_STATE_OFF = 8;
}

enum TVCState {
  TVC_STATE_UNKNOWN = 0;
  TVC_STATE_IDLE = 1;
  TVC_STATE_FLIGHT = 2;
  TVC_STATE_TRACE_PRIMED = 3;
  TVC_STATE_TRACE = 4;
  TVC_STATE_ABORT = 5;
  TVC_STATE_OFF = 6;

}
enum RCSState {
  RCS_STATE_UNKNOWN = 0;
  RCS_STATE_IDLE = 1;
  RCS_STATE_VALVE_PRIMED = 2;
  RCS_STATE_VALVE_SEQ = 3;
  RCS_STATE_ROLL_PRIMED = 4;
  RCS_STATE_ROLL_SEQ = 5;
  RCS_STATE_ABORT = 6;
  RCS_STATE_OFF = 7;

}
// next tag: 21
message DataPacket {
  // Time since chip start in nanoseconds.
  required uint64 time_ns = 1;

  // Controller metrics

  // Current controller state
  required SystemState state = 6;
  required ThrottleState throttle_state = 21;
  required TVCState tvc_state = 22;
  required RCSState rcs_state = 23;



  // Time taken by various controller components.
  required ControllerTiming controller_timing = 20;

  // Size of pending queue of data packets to send.
  required uint32 data_queue_size = 2;

  // Counts up for each data packet sent.
  required uint64 sequence_number = 8;

  required bool gnc_connected = 15;
  required float gnc_last_pinged_ns = 16;

  required bool daq_connected = 17;
  required float daq_last_pinged_ns = 18;

  // Sensors
  required AnalogSensorReadings analog_sensors = 19;

  // Actuators
  required ValveStatus fuel_valve = 3;
  required ValveStatus lox_valve = 4;

  oneof throttle_state_data {
    // IDLE, VALVE_PRIMED, THRUST_PRIMED
    IdleData idle_data = 13;

    // ABORT
    AbortData abort_data = 14;

    // VALVE_CALIBRATION
    ValveCalibrationData valve_calibration_data = 9;

    // VALVE_SEQ
    ValveSequenceData valve_sequence_data = 10;

    // THRUST_SEQ
    ThrustSequenceData thrust_sequence_data = 11;
  }
}

// Stats on controller and sensor execution times.
message ControllerTiming {
  required float controller_tick_time_ns = 1;
  required float analog_sensors_sense_time_ns = 2;
  required float lidar_sense_time_ns = 3;
}

message ValveStatus {
  required float target_pos_deg = 1;
  required float driver_setpoint_pos_deg = 2;
  required float encoder_pos_deg = 3;
  required bool is_on = 4;
}

// PTs are in psig, TCs are in deg C, raw are in volts.
message AnalogSensorReadings {
  // Vehicle pressurant
  optional float pt001 = 1;
  optional float pt002 = 2;
  optional float pt003 = 3;
  optional float pt004 = 4;
  optional float pt005 = 5;

  // Vehicle fuel side
  optional float pt101 = 6;

  // Vehicle LOx side
  optional float pt201 = 7;

  // Engine
  optional float ptf1 = 8;
  optional float ptf2 = 9;
  optional float pto1 = 10;
  optional float ptc1 = 11;
  optional float ptc2 = 12;

  // TCs
  optional float tc001 = 13;
  optional float tc101 = 14;
  optional float tc102 = 15;
  optional float tcf1 = 16;
  optional float tco1 = 17;

  // GSE pressurant
  optional float ptg001 = 18;
  optional float ptg002 = 19;

  // GSE LOx
  optional float ptg101 = 20;

  // Hornet
  optional float battery_voltage = 21;
}

message IdleData {}

message AbortData {}

message ValveCalibrationData {
  required bool fuel_found_hardstop = 3;
  required float fuel_hardstop_pos = 4;
  required bool lox_found_hardstop = 7;
  required float lox_hardstop_pos = 8;

  required int32 cal_phase = 9;
  required int32 rep_count = 10;

  required float fuel_err = 11;
  required float lox_err = 12;
}

message ValveSequenceData {}

// TODO
message ThrustSequenceData {
  required float predicted_thrust = 1;
  required float predicted_of = 2;
  required float mdot_fuel = 3;
  required float mdot_lox = 4;
  required float target_thrust = 5;

  required float thrust_error = 6;

  required float change_alpha_cmd = 7;
  required float clamped_change_alpha_cmd = 8;

  required float alpha = 9;
  required float thrust_from_alpha = 10;

  required float fuel_valve_cmd = 11;
  required float lox_valve_cmd = 12;
}
