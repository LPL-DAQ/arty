# Available runners configured by board.cmake.
runners:
- tycmd_flasherd

# Default flash runner if --runner is not given.
flash-runner: tycmd_flasherd

# Common runner configuration values.
config:
  board_dir: /workspaces/arty/boards/lpl/teensy_hive
  # Build outputs:
  elf_file: zephyr.elf
  hex_file: zephyr.hex
  bin_file: zephyr.bin
  # Host tools:
  gdb: /home/lpl/zephyr-sdk-0.17.2/arm-zephyr-eabi/bin/arm-zephyr-eabi-gdb
  openocd: /home/lpl/zephyr-sdk-0.17.2/sysroots/x86_64-pokysdk-linux/usr/bin/openocd
  openocd_search:
    - /home/lpl/zephyr-sdk-0.17.2/sysroots/x86_64-pokysdk-linux/usr/share/openocd/scripts

# Runner specific arguments
args:
  tycmd_flasherd:
    []

